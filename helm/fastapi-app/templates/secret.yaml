apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fastapi-app.fullname" . }}-secret
  labels:
    {{- include "fastapi-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_PASSWORD: {{ .Values.env.DATABASE_PASSWORD | quote }}
  JWT_SECRET_KEY: {{ .Values.env.JWT_SECRET_KEY | quote }}
