[tool.ruff]
target-version = "py312"
line-length = 100
src = ["app"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "S",    # flake8-bandit
    "A",    # flake8-builtins
    "C4",   # flake8-comprehensions
    "T20",  # flake8-print
]
ignore = [
    "B008",  # do not perform function call in argument defaults (needed for FastAPI Depends)
    "S105",  # hardcoded-password-string (needed for default JWT secret)
    "S106",  # hardcoded-password-func-arg
]

[tool.ruff.lint.per-file-ignores]
"app/tests/*" = ["S101"]  # Allow assert in tests

[tool.pytest.ini_options]
testpaths = ["app/tests"]
asyncio_mode = "auto"
